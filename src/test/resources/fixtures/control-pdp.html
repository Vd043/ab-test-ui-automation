<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cashmere Sweater</title>
    <style>
        body { font-family: sans-serif; margin: 24px; }
        .price { font-size: 20px; margin: 12px 0; }
    </style>
</head>
<body data-experiment="pdp-cta" data-variant="control">
    <h1 id="product-title" data-testid="product-title">Cashmere Sweater</h1>
    <div class="price" data-testid="price">$89.00</div>
    <button data-testid="add-to-cart">Add to Cart</button>
    <p>Cart: <span id="cart-count" data-testid="cart-count">0</span></p>

    <script>
        document.querySelector('[data-testid="add-to-cart"]').addEventListener('click', function () {
            document.getElementById('cart-count').textContent = '1';
        });
    </script>
</body>
</html>
